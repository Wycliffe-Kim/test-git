name: CD

on:
  workflow_run:
    workflows: [ CI ]
    branches: [ master ]
    types:
      - completed

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCE_INSTANCE: analytics-setting	  
  GCE_INSTANCE_ZONE: asia-northeast3-a

jobs:
  cd: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: GCP Github Action
        uses: google-github-actions/setup-gcloud@v0
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # - name: GCE get IAM policy
      #   run: |-
      #     gcloud iam service-accounts get-iam-policy ${{ secrets.GCP_PROJECT_ID }}

      - name: Connect GCE And execute docker ps
        run: |-
          gcloud compute ssh "$GCE_INSTANCE" --zone "$GCE_INSTANCE_ZONE" -- 'docker ps'