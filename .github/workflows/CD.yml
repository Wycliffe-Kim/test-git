on: [push]

env:
  GCE_INSTANCE: analytics-setting
  GCE_INSTANCE_ZONE: asia-northeast3-a
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  CLOUDSDK_PYTHON: /usr/bin/python3
  GITHUB_SHA: ${{ github.sha }}
  NODE_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/analytics-setting-test-node:${{ github.sha }}
  NGINX_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/analytics-setting-test-nginx:${{ github.sha }}

jobs:
  cd:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v0
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: GCP Github Action
      uses: google-github-actions/setup-gcloud@v0
      with:
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        configure_docker: true

    - name: GCP configure docker
      run: |
        gcloud --quiet auth configure-docker

    - name: Print Python3 Version
      run: |
        python3 --version

    - name: Print Python3 Version in GCP
      run: |
        gcloud compute ssh "$GCE_INSTANCE" --zone "$GCE_INSTANCE_ZONE" \
        --command="python3 --version"

    - name: Export Python3 Path
      run: |
        gcloud compute ssh "$GCE_INSTANCE" --zone "$GCE_INSTANCE_ZONE" \
        --command="export CLOUDSDK_PYTHON=/usr/bin/python3"

    - name: Env Python3
      run: |
        gcloud compute ssh "$GCE_INSTANCE" --zone "$GCE_INSTANCE_ZONE" \
        --command="echo ${CLOUDSDK_PYTHON}"

    - name: Docker Build Node
      run: |
        cd node && docker build -t $NODE_IMAGE .

    - name: Docker Build Nginx
      run: |
        cd nginx && docker build -t $NGINX_IMAGE .

    - name: Docker Push Node
      run: |
        cd node && docker push $NODE_IMAGE

    - name: Docker Push Nginx
      run: |
        cd nginx && docker push $NGINX_IMAGE

    # - name: Docker Compose Build
    #   run: |
    #     docker-compose build

    # - name: Docker Compose Push
    #   run: |
    #     docker-compose push

    - name: Deploy Nginx
      id: deploy_nginx
      uses: google-github-actions/deploy-cloudrun@v0
      with:
        service: test-nginx
        image: $NGINX_IMAGE

    - name: Deploy Node
      id: deploy_node
      uses: google-github-actions/deploy-cloudrun@v0
      with:
        service: test-node
        image: $NODE_IMAGE

    - name: Check Output For Deploying Nginx
      run: |
        echo ${{ steps.deploy_nginx.outputs.url }}

    - name: Check Output For Deploying Node
      run: |
        echo ${{ steps.deploy_node.outputs.url }}

