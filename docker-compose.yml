version: '3.4'

services:
  node:
    container_name: node
    image: ${DOCKER_HUB_USERNAME}/test-git_node:latest
    build:
      dockerfile: Dockerfile
      context: ./node
    volumes:
      - /usr/app/node_modules
    environment: 
      - DOCKER_HUB_USERNAME=${DOCKER_HUB_USERNAME}

  python:
    container_name: python
    image: ${DOCKER_HUB_USERNAME}/test-git_python:latest
    build: 
      dockerfile: Dockerfile
      context: ./python
    environment: 
      - DOCKER_HUB_USERNAME=${DOCKER_HUB_USERNAME}
      