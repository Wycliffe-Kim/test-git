version: '3.4'

services:
  nginx:
    container: nginx
    restart: always
    image: ${DOCKER_HUB_USERNAME}/test_git_nginx:latest
    build:
      dockerfile: Dockerfile
      context: ./nginx
    depends_on: 
      - node
    ports: 
      - 80:80
    
  node:
    container_name: node
    image: ${DOCKER_HUB_USERNAME}/test-git_node:latest
    build:
      dockerfile: Dockerfile
      context: ./node
    volumes:
      - /usr/app/node_modules

  python:
    container_name: python
    image: ${DOCKER_HUB_USERNAME}/test-git_python:latest
    build: 
      dockerfile: Dockerfile
      context: ./python
      